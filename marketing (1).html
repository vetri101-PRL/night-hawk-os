<script>
const API_URL_KEY = 'nh.apiUrl';
const CLAUDE_KEY = 'nh_claude_key';
const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbxw_AE0A4Ej_aa-iR5ZnkbbwjeYfS1zQi6k-OrAcYjSLFT4L04d_kJ4_5MQUlbt_iPA/exec';

let NH = { rows: [], skus: [], cities: [], loaded: false };
let currentView = 'overview';

function getApi() {
  return localStorage.getItem(API_URL_KEY) || DEFAULT_API;
}

function setApiKey() {
  const k = prompt('Enter your Claude API key (sk-ant-...):');
  if (k && k.startsWith('sk-')) {
    localStorage.setItem(CLAUDE_KEY, k);
    alert('Claude API key saved! AI features are now active.');
  } else if (k) {
    alert('Invalid key format. Should start with sk-ant-');
  }
}

function changeApiUrl() {
  const u = prompt('Enter Google Apps Script API URL:', getApi());
  if (u && u.includes('script.google.com')) {
    localStorage.setItem(API_URL_KEY, u);
    alert('API URL updated. Refreshing...');
    location.reload();
  }
}

async function loadData() {
  try {
    const url = getApi();
    const [salesResp, kpiResp, masterResp] = await Promise.all([
      fetch(url + '?type=sales'),
      fetch(url + '?type=kpis'),
      fetch(url + '?type=master')
    ]);
    const sales = await salesResp.json();
    const kpis = await kpiResp.json();
    const master = await masterResp.json();

    NH.rows = (sales.data || []).filter(r => r.date && r.sku && r.units);
    NH.kpis = kpis.data || {};
    NH.skus = (master.skus || []);
    NH.cities = (master.cities || []);
    NH.loaded = true;

    // Derive aggregates
    NH.byCity = {};
    NH.bySku = {};
    NH.byMonth = {};
    NH.rows.forEach(r => {
      const units = parseFloat(r.units) || 0;
      const rev = parseFloat(r.revenue) || (units * 87.85);
      const d = r.date || '';
      const mo = d.substring(0, 7);
      const city = r.city || 'Unknown';
      const sku = r.sku || 'Unknown';

      NH.byCity[city] = NH.byCity[city] || { units: 0, rev: 0 };
      NH.byCity[city].units += units;
      NH.byCity[city].rev += rev;

      NH.bySku[sku] = NH.bySku[sku] || { units: 0, rev: 0 };
      NH.bySku[sku].units += units;
      NH.bySku[sku].rev += rev;

      NH.byMonth[mo] = NH.byMonth[mo] || { units: 0, rev: 0 };
      NH.byMonth[mo].units += units;
      NH.byMonth[mo].rev += rev;
    });

    NH.totalRev = Object.values(NH.bySku).reduce((s, v) => s + v.rev, 0);
    NH.totalUnits = Object.values(NH.bySku).reduce((s, v) => s + v.units, 0);

    switchView('overview');
  } catch (e) {
    document.getElementById('main-content').innerHTML = '<div class="loading" style="color:#D4364A">Failed to load data: ' + e.message + '<br><br><button class="btn btn-primary" onclick="loadData()">Retry</button></div>';
  }
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');
  if (!NH.loaded) { loadData(); return; }
  const fns = { overview: renderOverview, ai: renderAI, campaigns: renderCampaigns, creative: renderCreative, listing: renderListing, audience: renderAudience, budget: renderBudget };
  if (fns[view]) fns[view]();
}

function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
function fmtN(n) { return Math.round(n).toLocaleString('en-IN'); }

// Destroy existing chart on canvas
function makeChart(id, config) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (canvas._chart) canvas._chart.destroy();
  canvas._chart = new Chart(canvas, config);
  return canvas._chart;
}
</script>
<script>
function renderOverview() {
  const mc = document.getElementById('main-content');
  const months = Object.keys(NH.byMonth).sort();
  const skuList = Object.entries(NH.bySku).sort((a,b) => b[1].rev - a[1].rev);
  const cityList = Object.entries(NH.byCity).sort((a,b) => b[1].rev - a[1].rev).slice(0,7);
  const totalRev = NH.totalRev;
  const totalUnits = NH.totalUnits;

  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value">${fmt(totalRev)}</div><div class="kpi-sub">2026-03-17 → 2026-06-14</div></div>
    <div class="kpi-card"><div class="kpi-label">Units Sold</div><div class="kpi-value">${fmtN(totalUnits)}</div><div class="kpi-sub">Avg ${fmt(avgPrice)}/unit</div></div>
    <div class="kpi-card"><div class="kpi-label">Ad Spend</div><div class="kpi-value">₹0</div><div class="kpi-sub">No paid campaigns yet</div></div>
    <div class="kpi-card"><div class="kpi-label">Blended ROAS</div><div class="kpi-value">0x</div><div class="kpi-sub">No ad spend</div></div>
    <div class="kpi-card"><div class="kpi-label">CM / Can</div><div class="kpi-value">₹8</div><div class="kpi-sub">After platform costs</div></div>
    <div class="kpi-card"><div class="kpi-label">Storage / Revenue</div><div class="kpi-value">${storageRatio}%</div><div class="kpi-sub">Target &lt;25%</div></div>
  </div>
  <div class="two-col">
    <div class="card"><div class="card-title">Revenue by Month</div><div class="card-sub">Monthly revenue trend across all SKUs and cities.</div><canvas id="chart-monthly" height="180"></canvas></div>

  </div>
  <div class="two-col">
    <div class="card"><div class="card-title">Top Cities by Revenue</div><div class="card-sub">City-level revenue performance. Top 7 cities shown.</div>
      <table><thead><tr><th>City</th><th>Units</th><th>Revenue</th><th>Rev/Unit</th></tr></thead><tbody>
      ${cityList.map(([city, v]) => '<tr><td>' + city + '</td><td>' + fmtN(v.units) + '</td><td>' + fmt(v.rev) + '</td><td>' + fmt(v.rev/Math.max(v.units,1)) + '</td></tr>').join('')}
      </tbody></table>
    </div>
    <div class="card"><div class="card-title">SKU Performance</div><div class="card-sub">Units sold and revenue contribution per SKU.</div>
      <table><thead><tr><th>SKU</th><th>Units</th><th>Revenue</th><th>Status</th></tr></thead><tbody>
      ${skuList.map(([sku, v]) => {
        const pct = Math.round(v.rev / totalRev * 100);
        const badge = pct > 50 ? 'badge-green' : pct > 10 ? 'badge-blue' : 'badge-gray';
        return '<tr><td>' + sku + '</td><td>' + fmtN(v.units) + '</td><td>' + fmt(v.rev) + '</td><td><span class="badge ' + badge + '">' + pct + '% of rev</span></td></tr>';
      }).join('')}
      </tbody></table>
    </div>
  </div>
  <div class="card"><div class="card-title">🎯 Where to Spend Your First Marketing Budget</div><div class="card-sub">AI recommendation based on your current sales data.</div>
    <div class="ai-rec"><strong>✓ REC 1 &nbsp; Blinkit Sponsored Listings — Berry Burst Single Can in Bangalore &amp; Hyderabad.</strong> These two cities drive ${fmt(cityList.slice(0,2).reduce((s,c)=>s+c[1].rev,0))} in revenue organically. Adding ₹8,000–12,000/month in Blinkit ads here should yield 3–4x ROAS based on category benchmarks.</div>
    <div class="ai-rec"><strong>✓ REC 2 &nbsp; Run a "₹10 off 2-Pack" promotion to clear Berry Burst 2-Pack stock.</strong> The BB 2-Pack has a 3% complaint rate and is pausing expansion. A limited promotion clears inventory, reduces storage fees, and generates review velocity.</div>
    <div class="ai-rec" style="border-left-color:#f59e0b"><strong>→ REC 3 &nbsp; Mumbai is your fastest-growing city but needs inventory positioning.</strong> Pre-stock before running any Mumbai ads — demand is already there organically.</div>
  </div>`;

  // Charts
  setTimeout(() => {
    makeChart('chart-monthly', {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{ label: 'Revenue', data: months.map(m => Math.round(NH.byMonth[m].rev)), backgroundColor: '#0B3954', borderRadius: 4 }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '₹' + (v/1000).toFixed(0) + 'K' } } } }
    });
    const skuColors = ['#0B3954','#D4364A','#F0A500','#2952B3','#22c55e','#a855f7'];
    makeChart('chart-sku', {
      type: 'doughnut',
      data: {
        labels: skuList.map(([s]) => s),
        datasets: [{ data: skuList.map(([,v]) => Math.round(v.rev)), backgroundColor: skuColors }]
      },
      options: { responsive: true, plugins: { legend: { position: 'right', labels: { font: { size: 10 }, boxWidth: 12 } } } }
    });
  }, 50);
}
</script>

function calcBudget() {
  const budget = parseFloat(document.getElementById('budget-input').value) || 0;
  const roas = parseFloat(document.getElementById('roas-input').value) || 1;
  const expectedRev = budget * roas;
  const netGain = expectedRev - budget;
  const el = document.getElementById('budget-output');
  if (el) el.innerHTML = `<div style="font-weight:700;margin-bottom:6px">Projected Outcomes</div>
    <div>Expected Revenue: <strong>${fmt(expectedRev)}/month</strong></div>
    <div>Net Gain (after ad spend): <strong>${fmt(netGain)}/month</strong></div>
    <div>Break-even ROAS: <strong>1.0x</strong></div>`;
}

// AI Chat
let chatHistory = [];
function renderAI() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `
  <h1 class="page-title">Ask Marketing AI</h1>
  <p class="page-sub">Ask anything about your marketing strategy. Powered by Claude.</p>
  <div class="chat-area">
    <div class="chat-messages" id="chat-msgs">
      <div class="msg ai"><div class="msg-label">Marketing AI</div><div class="msg-bubble">Hi! I'm your Night Hawk Marketing advisor. I've analyzed your sales data — ₹54,028 revenue across 615 units in 14 cities, all organic from Blinkit.<br><br>Ask me anything: which city to target first, how to reduce storage fees, what creative to run, or how to set up your first sponsored campaign.</div></div>
    </div>
    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="Ask your marketing advisor... (Enter to send, Shift+Enter for new line)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="btn btn-primary" onclick="sendChat()">Ask</button>
    </div>
  </div>`;
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const msgs = document.getElementById('chat-msgs');
  if (!inp || !msgs) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  appendMsg(msgs, 'user', text);

  const claudeKey = localStorage.getItem(CLAUDE_KEY);
  if (!claudeKey) {
    appendMsg(msgs, 'ai', 'Please set your Claude API key first. Click "Set Claude API Key" in the sidebar.');
    return;
  }

  const thinking = document.createElement('div');
  thinking.className = 'msg ai';
  thinking.id = 'thinking';
  thinking.innerHTML = '<div class="msg-label">Marketing AI</div><div class="msg-bubble"><span class="spinner"></span> Thinking...</div>';
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;

  const systemPrompt = `You are the Night Hawk Energy Drink Marketing Advisor. Night Hawk is a 3-year-old Indian beverage company now pivoting to AI-first operations. Current data: Revenue ₹54,028 over 90 days (Blinkit only, 100% organic), 615 units, avg price ₹87.85, CM ₹8.44/can, storage fee 27.6% (target <25%). Top SKU: Berry Burst Single Can (434 units, 70% of revenue). Top cities: Bangalore (133u), Hyderabad (138u), Mumbai (74u). No paid ads running. 14 cities active. BB 2-Pack paused due to quality complaints. Zepto expansion planned. Give strategic, data-driven marketing advice.`;

  chatHistory.push({ role: 'user', content: text });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': claudeKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 1024, system: systemPrompt, messages: chatHistory })
    });
    const data = await resp.json();
    const reply = data.content && data.content[0] ? data.content[0].text : 'Sorry, I could not get a response.';
    chatHistory.push({ role: 'assistant', content: reply });
    const t = document.getElementById('thinking');
    if (t) t.remove();
    appendMsg(msgs, 'ai', reply);
  } catch (e) {
    const t = document.getElementById('thinking');
    if (t) t.remove();
    appendMsg(msgs, 'ai', 'Error: ' + e.message + '. Check your API key and try again.');
  }
}

function appendMsg(container, role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="msg-label">' + (role === 'user' ? 'You' : 'Marketing AI') + '</div><div class="msg-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Init
window.onload = function() { loadData(); };
</script>
